<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Options Screener</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Custom styles for real-time flash effects */
        .flash-up {
            animation: flashGreen 0.5s ease-out;
        }
        .flash-down {
            animation: flashRed 0.5s ease-out;
        }
        @keyframes flashGreen {
            0% { background-color: rgba(34, 197, 94, 0.5); }
            100% { background-color: transparent; }
        }
        @keyframes flashRed {
            0% { background-color: rgba(239, 68, 68, 0.5); }
            100% { background-color: transparent; }
        }
        /* Standard options chain styling */
        .itm-call { background-color: #f0fdf4; } /* Light green for ITM Calls */
        .itm-put { background-color: #fef2f2; }  /* Light red for ITM Puts */
        
        @media (prefers-color-scheme: dark) {
            body { background-color: #111827; color: #f9fafb; }
            .itm-call { background-color: #064e3b; } /* Dark green for ITM Calls */
            .itm-put { background-color: #7f1d1d; }  /* Dark red for ITM Puts */
            .border-gray-200 { border-color: #374151; }
            .bg-white { background-color: #1f2937; }
            .bg-gray-50 { background-color: #111827; }
            .text-gray-900 { color: #f3f4f6; }
            .text-gray-500 { color: #9ca3af; }
        }
    </style>
</head>
<body class="p-4 md:p-6 transition-colors duration-200">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white dark:bg-gray-800 p-4 rounded-lg shadow">
            <div class="text-center md:text-left mb-4 md:mb-0">
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Real-Time Options Screener</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400">Monitoring dynamically generated strike prices</p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-right">
                    <div class="text-sm text-gray-500 dark:text-gray-400">Underlying Asset</div>
                    <div class="text-xl font-bold flex items-center justify-end">
                        <span id="currentSymbolDisplay" class="tracking-wide">CIPLA</span>
                        <span id="currentPriceDisplay" class="ml-3 px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 font-mono transition-colors">
                            1476.80
                        </span>
                    </div>
                </div>
                <div class="flex items-center space-x-2 mr-2">
                    <span id="connDot" class="w-3 h-3 rounded-full bg-gray-400"></span>
                    <span id="connText" class="text-xs text-gray-500 dark:text-gray-400 whitespace-nowrap">Offline</span>
                </div>
                <button id="toggleSimBtn" onclick="toggleLiveFeed()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow font-medium transition whitespace-nowrap">
                    Connect to Upstox Bridge
                </button>
            </div>
        </div>

        <!-- Controls -->
        <div class="mb-6 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
            
            <!-- Search Widget -->
            <div class="flex flex-col gap-2 w-full md:w-auto">
                <div class="flex gap-2">
                    <input type="text" id="stockSearchInput" placeholder="Search (e.g. NIFTY)" class="w-full md:w-56 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase font-medium">
                    <button onclick="searchStock()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-medium shadow transition">
                        Search
                    </button>
                    <select id="expirySelect" onchange="changeExpiry()" class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Expiry</option>
                    </select>
                </div>
                <div id="searchMessage" class="text-xs text-green-600 dark:text-green-400 hidden">Stock loaded successfully.</div>
            </div>

            <!-- Strike Widget -->
            <div class="flex flex-col gap-2 w-full md:w-auto">
                <div class="flex gap-2">
                    <input type="number" id="newStrikeInput" placeholder="Custom strike..." class="w-full md:w-48 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="addStrike()" class="bg-gray-800 dark:bg-gray-600 hover:bg-gray-700 dark:hover:bg-gray-500 text-white px-4 py-2 rounded shrink-0 transition shadow">
                        Add Strike
                    </button>
                    <button onclick="resetStrikes()" class="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded px-4 py-2 shrink-0 transition font-medium border border-transparent hover:border-red-200 dark:hover:border-red-800">
                        Reset
                    </button>
                </div>
                <div id="strikeErrorMsg" class="text-xs text-red-500 hidden">Please enter a valid positive strike price.</div>
            </div>
        </div>

        <!-- Options Chain Table -->
        <div class="overflow-x-auto shadow ring-1 ring-black ring-opacity-5 md:rounded-lg">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                <thead class="bg-gray-50 dark:bg-gray-900">
                    <tr>
                        <th colspan="4" class="py-3 text-center text-sm font-semibold text-green-700 dark:text-green-400 border-b border-gray-200 dark:border-gray-700">CALLS</th>
                        <th class="py-3 text-center text-sm font-semibold text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 bg-gray-100 dark:bg-gray-800 shadow-inner">STRIKE</th>
                        <th colspan="4" class="py-3 text-center text-sm font-semibold text-red-700 dark:text-red-400 border-b border-gray-200 dark:border-gray-700">PUTS</th>
                    </tr>
                    <tr>
                        <th scope="col" class="px-2 md:px-3 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
                        <th scope="col" class="px-2 md:px-3 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">OI</th>
                        <th scope="col" class="px-2 md:px-3 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">IV</th>
                        <th scope="col" class="px-2 md:px-3 py-3 text-right text-xs font-bold text-green-700 dark:text-green-400 uppercase tracking-wider">Call LTP</th>
                        <th scope="col" class="px-2 md:px-3 py-3 text-center text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider bg-gray-100 dark:bg-gray-800 shadow-inner">Strike</th>
                        <th scope="col" class="px-2 md:px-3 py-3 text-left text-xs font-bold text-red-700 dark:text-red-400 uppercase tracking-wider">Put LTP</th>
                        <th scope="col" class="px-2 md:px-3 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">IV</th>
                        <th scope="col" class="px-2 md:px-3 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">OI</th>
                        <th scope="col" class="px-2 md:px-3 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
                    </tr>
                </thead>
                <tbody id="optionsBody" class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                    <!-- Rows will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Mock Database for popular stocks to simulate searching
        const mockMarketData = {
            'CIPLA': 1476.80,
            'RELIANCE': 3120.50,
            'TCS': 3950.00,
            'HDFCBANK': 1680.20,
            'INFY': 1520.00,
            'SBIN': 840.10,
            'ITC': 430.75,
            'NIFTY': 24100.00,
            'BANKNIFTY': 52300.00,
            'TATAMOTORS': 980.50,
            'ZOMATO': 210.30
        };

        let currentSymbol = 'NIFTY';
        let currentPrice = mockMarketData[currentSymbol] || 0;
        let lastPrice = currentPrice;

        // Live chain state (populated by the bridge).
        let chainRows = [];          // [{strike, call:{ltp,oi,iv}, put:{ltp,oi,iv}}]
        let customStrikes = [];      // user-added strikes (intrinsic-only if not in feed)
        let currentExpiry = null;
        let availableExpiries = [];

        let isSimulating = false;
        let simInterval = null;

        // Formats money nicely (2 decimal places)
        const formatMoney = (val) => Number(val || 0).toFixed(2);
        const formatOI = (val) => {
            val = Number(val || 0);
            if (val >= 1e7) return (val / 1e7).toFixed(2) + 'Cr';
            if (val >= 1e5) return (val / 1e5).toFixed(2) + 'L';
            if (val >= 1e3) return (val / 1e3).toFixed(1) + 'K';
            return String(Math.round(val));
        };

        // Populate the expiry dropdown.
        function renderExpiries() {
            const sel = document.getElementById('expirySelect');
            sel.innerHTML = '';
            if (!availableExpiries.length) {
                sel.innerHTML = '<option value="">Expiry</option>';
                return;
            }
            availableExpiries.forEach(exp => {
                const opt = document.createElement('option');
                opt.value = exp;
                opt.textContent = exp;
                if (exp === currentExpiry) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        // Merge live rows with any custom strikes (custom ones get intrinsic-only).
        function buildDisplayRows() {
            const byStrike = new Map();
            chainRows.forEach(r => byStrike.set(Number(r.strike), r));

            customStrikes.forEach(s => {
                if (!byStrike.has(s)) {
                    const ci = Math.max(0, currentPrice - s);
                    const pi = Math.max(0, s - currentPrice);
                    byStrike.set(s, {
                        strike: s, custom: true,
                        call: { ltp: ci, oi: 0, iv: 0 },
                        put: { ltp: pi, oi: 0, iv: 0 },
                    });
                }
            });

            return [...byStrike.values()].sort((a, b) => a.strike - b.strike);
        }

        // Render the live options chain table.
        function renderTable() {
            const tbody = document.getElementById('optionsBody');
            const rows = buildDisplayRows();

            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="9" class="py-8 text-center text-gray-500">Connect to the bridge to load the live option chain.</td></tr>';
                return;
            }

            tbody.innerHTML = rows.map(r => {
                const strike = r.strike;
                const callITM = currentPrice > strike;   // calls ITM when spot above strike
                const putITM = strike > currentPrice;    // puts ITM when spot below strike

                const callClass = callITM ? 'itm-call' : '';
                const putClass = putITM ? 'itm-put' : '';
                const callStatusColor = callITM ? 'text-green-600 dark:text-green-400 font-bold' : 'text-gray-500 dark:text-gray-400';
                const putStatusColor = putITM ? 'text-red-600 dark:text-red-400 font-bold' : 'text-gray-500 dark:text-gray-400';
                const customMark = r.custom ? '<span class="text-blue-500 text-[10px] align-super">*</span>' : '';

                return `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                        <td class="px-2 md:px-3 py-3 whitespace-nowrap text-xs ${callClass}">
                            <span class="${callStatusColor} px-2 py-1 rounded-md ${callITM ? 'bg-green-100 dark:bg-green-900/40' : ''}">${callITM ? 'ITM' : 'OTM'}</span>
                        </td>
                        <td class="px-2 md:px-3 py-3 whitespace-nowrap text-xs text-right font-mono text-gray-500 dark:text-gray-400 ${callClass}">${formatOI(r.call.oi)}</td>
                        <td class="px-2 md:px-3 py-3 whitespace-nowrap text-xs text-right font-mono text-gray-500 dark:text-gray-400 ${callClass}">${formatMoney(r.call.iv)}</td>
                        <td class="px-2 md:px-3 py-3 whitespace-nowrap text-sm text-right font-mono font-bold text-green-700 dark:text-green-400 ${callClass}">${formatMoney(r.call.ltp)}</td>
                        <td class="px-2 md:px-3 py-3 whitespace-nowrap text-sm text-center font-bold font-mono bg-gray-50 dark:bg-gray-900 border-x border-gray-200 dark:border-gray-700">${strike}${customMark}</td>
                        <td class="px-2 md:px-3 py-3 whitespace-nowrap text-sm text-left font-mono font-bold text-red-700 dark:text-red-400 ${putClass}">${formatMoney(r.put.ltp)}</td>
                        <td class="px-2 md:px-3 py-3 whitespace-nowrap text-xs text-right font-mono text-gray-500 dark:text-gray-400 ${putClass}">${formatMoney(r.put.iv)}</td>
                        <td class="px-2 md:px-3 py-3 whitespace-nowrap text-xs text-right font-mono text-gray-500 dark:text-gray-400 ${putClass}">${formatOI(r.put.oi)}</td>
                        <td class="px-2 md:px-3 py-3 whitespace-nowrap text-xs text-right ${putClass}">
                            <span class="${putStatusColor} px-2 py-1 rounded-md ${putITM ? 'bg-red-100 dark:bg-red-900/40' : ''}">${putITM ? 'ITM' : 'OTM'}</span>
                        </td>
                    </tr>`;
            }).join('');
        }

        // Update the underlying spot price + flash effect.
        function updatePrice(newPrice) {
            lastPrice = currentPrice;
            currentPrice = newPrice;

            const display = document.getElementById('currentPriceDisplay');
            display.textContent = formatMoney(currentPrice);

            display.classList.remove('flash-up', 'flash-down');
            void display.offsetWidth; // force reflow to restart animation
            if (currentPrice > lastPrice) {
                display.classList.add('flash-up');
                display.style.color = '#16a34a';
            } else if (currentPrice < lastPrice) {
                display.classList.add('flash-down');
                display.style.color = '#dc2626';
            }
        }

        // Apply a full chain snapshot from the bridge.
        function applyChain(data) {
            currentSymbol = (data.symbol || currentSymbol).toUpperCase();
            document.getElementById('currentSymbolDisplay').textContent = currentSymbol;

            if (Array.isArray(data.expiries)) {
                availableExpiries = data.expiries;
                currentExpiry = data.expiry || currentExpiry;
                renderExpiries();
            }

            // Cash-only stocks (no F&O): show a note; LTP columns are intrinsic values.
            const msgBox = document.getElementById('searchMessage');
            if (data.cash_only) {
                msgBox.textContent = `${currentSymbol}: no options listed — showing spot + intrinsic values.`;
                msgBox.className = 'text-xs text-amber-600 dark:text-amber-400 block mt-1';
            }

            chainRows = Array.isArray(data.rows) ? data.rows : [];
            if (typeof data.spot === 'number') updatePrice(data.spot);
            renderTable();
        }

        // ================= Data source (bridge OR serverless API) =================
        const WS_URL = 'ws://localhost:8765';
        // When served from Vercel (or any non-localhost host), poll the HTTPS
        // serverless function instead of the local WebSocket bridge.
        const IS_REMOTE = !['localhost', '127.0.0.1', ''].includes(location.hostname);
        let ws = null;
        let pollTimer = null;

        function setConn(kind) {
            // kind: 'live' | 'connecting' | 'offline' | 'sim'
            const dot = document.getElementById('connDot');
            const text = document.getElementById('connText');
            const btn = document.getElementById('toggleSimBtn');
            const map = {
                live:       ['bg-green-500 animate-pulse', 'Live (Upstox)',   'Disconnect'],
                connecting: ['bg-amber-500 animate-pulse', 'Connecting…',     'Connecting…'],
                sim:        ['bg-blue-500 animate-pulse',  'Simulated (local)', 'Stop Simulation'],
                offline:    ['bg-gray-400',                'Offline',          IS_REMOTE ? 'Start Live Data' : 'Connect to Upstox Bridge'],
            };
            const [dotCls, label, btnLabel] = map[kind];
            dot.className = 'w-3 h-3 rounded-full ' + dotCls;
            text.textContent = label;
            btn.textContent = btnLabel;
            if (kind === 'live' || kind === 'sim') {
                btn.classList.replace('bg-blue-600', 'bg-red-600');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');
            } else {
                btn.classList.replace('bg-red-600', 'bg-blue-600');
                btn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
            }
        }

        // ---- Remote mode: poll the serverless /api/chain endpoint ----
        async function pollOnce() {
            try {
                const url = `/api/chain?symbol=${encodeURIComponent(currentSymbol)}` +
                            (currentExpiry ? `&expiry=${encodeURIComponent(currentExpiry)}` : '');
                const res = await fetch(url, { cache: 'no-store' });
                const data = await res.json();
                if (data.type === 'error') {
                    const msgBox = document.getElementById('searchMessage');
                    msgBox.textContent = data.message || 'API error';
                    msgBox.className = 'text-xs text-red-500 block mt-1';
                    return;
                }
                if (data.type === 'chain') applyChain(data);
            } catch (e) {
                const msgBox = document.getElementById('searchMessage');
                msgBox.textContent = 'Cannot reach /api/chain (is UPSTOX_ACCESS_TOKEN set?)';
                msgBox.className = 'text-xs text-red-500 block mt-1';
            }
        }

        function startPolling() {
            setConn('live');
            currentSymbol = currentSymbol || 'NIFTY';
            pollOnce();
            pollTimer = setInterval(pollOnce, 1500);
        }

        function stopPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = null;
        }

        function stopLocalSim() {
            if (simInterval) clearInterval(simInterval);
            simInterval = null;
            isSimulating = false;
        }

        // Local fallback simulator (only used if the bridge is unreachable).
        function startLocalSim() {
            stopLocalSim();
            isSimulating = true;
            setConn('sim');
            simInterval = setInterval(() => {
                const vol = currentPrice * 0.0015;
                const newSpot = currentPrice + (Math.random() * vol * 2 - vol);
                // simulate synthetic chain rows
                const base = mockMarketData[currentSymbol] || 1000;
                const step = base > 10000 ? 100 : base > 1000 ? 50 : 20;
                const atm = Math.round(newSpot / step) * step;
                const rows = [];
                for (let i = -10; i <= 10; i++) {
                    const k = atm + i * step;
                    if (k <= 0) continue;
                    const ci = Math.max(0, newSpot - k);
                    const pi = Math.max(0, k - newSpot);
                    const tv = Math.max(1, step * 0.4);
                    rows.push({
                        strike: k,
                        call: { ltp: +(ci + tv * Math.random()).toFixed(2), oi: Math.floor(Math.random() * 5e5), iv: +(10 + Math.random() * 15).toFixed(2) },
                        put:  { ltp: +(pi + tv * Math.random()).toFixed(2), oi: Math.floor(Math.random() * 5e5), iv: +(10 + Math.random() * 15).toFixed(2) },
                    });
                }
                applyChain({ symbol: currentSymbol, spot: +newSpot.toFixed(2), expiry: 'SIMULATED', expiries: ['SIMULATED'], rows });
            }, 800);
        }

        function connectBridge() {
            setConn('connecting');
            try {
                ws = new WebSocket(WS_URL);
            } catch (e) {
                startLocalSim();
                return;
            }

            // If we can't reach the bridge quickly, fall back to local sim.
            const failTimer = setTimeout(() => {
                if (ws && ws.readyState !== WebSocket.OPEN) {
                    try { ws.close(); } catch (_) {}
                    ws = null;
                    startLocalSim();
                }
            }, 2500);

            ws.onopen = () => {
                clearTimeout(failTimer);
                setConn('live');
                ws.send(JSON.stringify({ action: 'subscribe', symbol: currentSymbol, expiry: currentExpiry }));
            };

            ws.onmessage = (ev) => {
                try {
                    const data = JSON.parse(ev.data);
                    if (data.type === 'error') {
                        const msgBox = document.getElementById('searchMessage');
                        msgBox.textContent = data.message || 'Bridge error';
                        msgBox.className = 'text-xs text-red-500 block mt-1';
                        return;
                    }
                    if (data.type === 'chain') {
                        applyChain(data);
                    }
                } catch (_) { /* ignore malformed */ }
            };

            ws.onclose = () => {
                clearTimeout(failTimer);
                if (!isSimulating) setConn('offline');
                ws = null;
            };
            ws.onerror = () => { /* onclose handles state */ };
        }

        // Button handler: connect/disconnect (bridge locally, polling remotely).
        function toggleLiveFeed() {
            if (IS_REMOTE) {
                if (pollTimer) { stopPolling(); setConn('offline'); }
                else { startPolling(); }
                return;
            }
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                ws.close();
                ws = null;
                setConn('offline');
                return;
            }
            if (isSimulating) {
                stopLocalSim();
                setConn('offline');
                return;
            }
            connectBridge();
        }

        // Search for a new underlying.
        function searchStock() {
            const input = document.getElementById('stockSearchInput').value.toUpperCase().trim();
            const msgBox = document.getElementById('searchMessage');
            if (!input) return;

            currentSymbol = input;
            currentExpiry = null;          // let the bridge pick nearest expiry
            customStrikes = [];
            chainRows = [];
            document.getElementById('currentSymbolDisplay').textContent = currentSymbol;

            const isLive = ws && ws.readyState === WebSocket.OPEN;
            if (IS_REMOTE) {
                // Remote: next poll picks up the new symbol immediately.
                msgBox.textContent = `Loading live chain for ${currentSymbol}…`;
                msgBox.className = 'text-xs text-green-600 dark:text-green-400 block mt-1';
                if (pollTimer) pollOnce(); else startPolling();
            } else if (isLive) {
                ws.send(JSON.stringify({ action: 'subscribe', symbol: currentSymbol, expiry: null }));
                msgBox.textContent = `Loading live chain for ${currentSymbol}…`;
                msgBox.className = 'text-xs text-green-600 dark:text-green-400 block mt-1';
            } else {
                currentPrice = mockMarketData[currentSymbol] || (Math.floor(Math.random() * 4900) + 100);
                lastPrice = currentPrice;
                document.getElementById('currentPriceDisplay').textContent = formatMoney(currentPrice);
                renderTable();
                msgBox.textContent = `Not connected — showing placeholder for ${currentSymbol}`;
                msgBox.className = 'text-xs text-blue-600 dark:text-blue-400 block mt-1';
            }

            document.getElementById('stockSearchInput').value = '';
            setTimeout(() => { msgBox.classList.add('hidden'); }, 4000);
        }

        // Change expiry from the dropdown.
        function changeExpiry() {
            const exp = document.getElementById('expirySelect').value;
            if (!exp) return;
            currentExpiry = exp;
            if (IS_REMOTE && pollTimer) {
                pollOnce();
            } else if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'subscribe', symbol: currentSymbol, expiry: exp }));
            }
        }

        // Allow pressing Enter key in search box
        document.getElementById('stockSearchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchStock();
        });

        // Add user-defined strike manually (shown with intrinsic values).
        function addStrike() {
            const input = document.getElementById('newStrikeInput');
            const errorMsg = document.getElementById('strikeErrorMsg');
            const val = parseFloat(input.value);

            if (!isNaN(val) && val > 0) {
                if (!customStrikes.includes(val)) {
                    customStrikes.push(val);
                    renderTable();
                }
                input.value = '';
                errorMsg.classList.add('hidden');
            } else {
                errorMsg.classList.remove('hidden');
            }
        }

        // Allow pressing Enter key in strike box
        document.getElementById('newStrikeInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addStrike();
        });

        // Reset custom strikes back to the live chain only.
        function resetStrikes() {
            customStrikes = [];
            renderTable();
            document.getElementById('strikeErrorMsg').classList.add('hidden');
        }

        // Initial Render on page load
        renderTable();
        setConn('offline');
        // On a deployed (remote) host, start live polling automatically.
        if (IS_REMOTE) startPolling();

    </script>
</body>
</html>
